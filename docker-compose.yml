version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kazify_postgres
    environment:
      POSTGRES_DB: kazify
      POSTGRES_USER: kazify_user
      POSTGRES_PASSWORD: kazify_secure_password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kazify_user -d kazify"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kazify_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kazify_backend
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_USER=kazify_user
      - DB_NAME=kazify
      - DB_PASSWORD=kazify_secure_password123
      - DB_PORT=5432
      - REDIS_URL=redis:6379
      - JWT_SECRET=kazify_super_jwt_secret_key_2026
      - MPESA_CONSUMER_KEY=dummy_consumer_key
      - MPESA_CONSUMER_SECRET=dummy_consumer_secret
      - MPESA_SHORTCODE=174379
      - MPESA_PASSKEY=bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919
      - MPESA_CALLBACK_URL=http://backend:8080/api/mpesa/callback
      - GOOGLE_MAPS_API_KEY=dummy_maps_key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kazify_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
      - NEXT_PUBLIC_GOOGLE_MAPS_KEY=dummy_maps_key
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
